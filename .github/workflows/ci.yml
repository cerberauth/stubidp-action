name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Check Format
        id: npm-format-check
        run: npm run format:check

      - name: Lint
        id: npm-lint
        run: npm run lint

      - name: Test
        id: npm-ci-test
        run: npm run ci-test

  test-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Action
        run: npm run package

      - name: Test Local Action
        id: test-action
        uses: ./
        with:
          port: '8484'
          redirect-uri: 'http://localhost:3000/callback'

      - name: Verify Output
        run: |
          if [ "${{ steps.test-action.outputs.issuer }}" != "http://localhost:8484" ]; then
            echo "Unexpected issuer: ${{ steps.test-action.outputs.issuer }}"
            exit 1
          fi
          if [ "${{ steps.test-action.outputs.discovery-url }}" != "http://localhost:8484/.well-known/openid-configuration" ]; then
            echo "Unexpected discovery-url: ${{ steps.test-action.outputs.discovery-url }}"
            exit 1
          fi
          if [ "${{ steps.test-action.outputs.port }}" != "8484" ]; then
            echo "Unexpected port: ${{ steps.test-action.outputs.port }}"
            exit 1
          fi

      - name: Verify StubIdP is running
        run: |
          curl --fail http://localhost:8484/.well-known/openid-configuration
